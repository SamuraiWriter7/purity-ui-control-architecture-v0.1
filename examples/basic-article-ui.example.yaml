notes: >
This example demonstrates a basic article-page UI configuration for Purity UI
Control Architecture v0.1. It shows how a reader-facing article page may include
a Purity badge, public core question, friction-only origin signal, trace summary,
non-guaranteed Royalty OS preview, and creator-defined inference boundaries
while keeping proto-friction, deep-layer context, and private creator notes protected.
