article_ui:
title: "Why AI-Era Articles Need Epicenter Visibility"
subtitle: "A beginner-friendly explanation of Purity UI"
author_display_name: "Civilization OS Architect"
article_type: essay
language: en

reader_facing_display:
purity_badge:
visible: true
label: "Purity: 87 / High Natural"
explanation: "Strong human-origin primary context is detected."

```
epicenter_summary:
  visible: true
  core_question: "How can creators preserve the source of meaning in AI-mediated platforms?"
  initial_friction_label: "ethical discomfort"
  meaning_boundary_summary: >
    This article explains Purity UI as a draft creator-control concept,
    not as a final legal, payment, or platform standard.

trace_summary:
  visible: true
  label: "AI reference signals detected"
  explanation: >
    Public trace summary is enabled. Private creator context is not shown.

royalty_preview:
  visible: true
  label: "Estimated allocation-readiness preview"
  disclaimer: >
    This preview is an estimation only. It does not guarantee payment,
    ownership, entitlement, or final allocation.

creator_boundary_notice:
  visible: true
  label: "Creator-defined visibility and inference boundaries are active."
```

creator_controls:
core_question_visibility: public
initial_friction_visibility: friction_only
deep_layer_visibility: private
proto_friction_enabled: true
trace_visibility_allowed: true
royalty_os_preview_allowed: true
ai_training_use_allowed: false
no_inference_policy_enabled: true
creator_note: >
This article page allows readers to see the public core question, an abstract
friction category, a public trace summary, and a non-guaranteed royalty-readiness
preview. Deep-layer context and private notes remain protected.

visibility_protocol:
article_title: public
public_summary: public
core_question: public
initial_friction: friction_only
proto_friction: private
deep_layer: private
rotation_dynamics: summary_only
interpretation_boundary: ai_readable
private_creator_note: private
trace_log: public
royalty_preview: public

no_inference_policy:
enabled: true
enforcement_level: platform_required
protected_fields:
- initial_friction
- proto_friction
- deep_layer
- private_creator_note
- meaning_boundary
- interpretation_boundary
- non_public_context
prohibited_actions:
- infer_intent
- reconstruct_private_context
- summarize_protected_fields
- convert_friction_to_diagnosis
- expand_meaning_boundary
- use_for_training
- generate_psychological_profile
- disclose_hidden_context
- generate_backstory
- resolve_unfinished_friction
public_label: "Creator-defined inference boundary active"
explanation: >
AI systems may discuss the public article content and the public core question.
They must not infer hidden personal context, reconstruct private background,
summarize protected fields, or use protected meaning structures for training.

